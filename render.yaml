# Render Blueprint: https://render.com/docs/infrastructure-as-code
# Dashboard: New > Blueprint > bu repoyu seç; gizli env'ler için sihirbazda değer gir.
services:
  - type: web
    name: gitmaestro-remote-queue
    runtime: python
    # Part 2 sunumu: kuyruk API kodu part2-demo'dan deploy edilir (main'deki Part 3 değişiklikleri UI'ı etkilemez).
    branch: part2-demo
    region: frankfurt
    plan: free
    buildCommand: pip install -r remote/queue_server/requirements.txt
    startCommand: cd remote/queue_server && uvicorn app:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips='*'
    healthCheckPath: /health
    envVars:
      - key: QUEUE_DB_PATH
        value: /tmp/gitmaestro-queue.db
      - key: REMOTE_UI_USERNAME
        sync: false
      - key: REMOTE_UI_PASSWORD
        sync: false
      - key: WORKER_TOKEN
        sync: false
